<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <div class="tab-header">
            <button id="btnIn" class="active">Login</button>
            <button id="btnUp">Cadastro</button>
        </div>

        <form id="formLogin" class="authForm">
            <h2>Faça seu login</h2>
            <hr>
            <label for="email">Email</label>
            <input type="email" name="email" id="email" placeholder="Digite seu email">
            <label for="password">Senha</label>
            <input type="password" name="password" id="password" placeholder="Digite sua senha">
            <button type="submit" class="submitBtn">Entrar</button>
        </form>
        <form id="formCadastrar" class="authForm">
            <h2>Crie sua conta</h2>
            <hr>
            <label for="email">Email</label>
            <input type="email" name="email" id="email" placeholder="Digite seu email">
            <label for="password">Senha</label>
            <input type="password" name="password" id="password" placeholder="Digite sua senha">
            <button type="submit" class="submitBtn">Cadastrar</button>
        </form>
    </div>

    <script src="script.js"></script>
</body>
</html>
